name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24' # Node.js 24 (LTS)
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - name: Build Web UI
        working-directory: ./web
        run: |
          npm ci
          npm run build

      - name: Verify Web Build
        run: ls -la web/dist

      - name: Verify Web Types
        working-directory: ./web
        run: npm run typecheck

      - name: Format Check
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "::error::Go formatting issues found. Run 'gofmt -w .' or 'make fmt' to fix."
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Vet Code
        run: make lint

      - name: Run Tests
        run: make test-fast

      - name: Build Binary
        run: make build

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          # Only run on changes in PRs to avoid noise from existing issues
          only-new-issues: true
