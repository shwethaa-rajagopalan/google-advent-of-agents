# Cloud Build configuration for building the ADK scion agent image
# This builds on top of the existing scion-base:latest image
#
# Trigger manually:
#   gcloud builds submit --config examples/adk_scion_agent/cloudbuild.yaml examples/adk_scion_agent/
steps:
  # Enable multi-arch builds
  - name: 'gcr.io/cloud-builders/docker'
    id: 'setup-buildx'
    args: ['buildx', 'create', '--name', 'mybuilder', '--use']
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'bootstrap-buildx'
    args: ['buildx', 'inspect', '--bootstrap']
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

  # Build and push scion-adk-agent image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-scion-adk-agent'
    args:
      - 'buildx'
      - 'build'
      - '--platform'
      - 'linux/amd64,linux/arm64'
      - '--build-arg'
      - 'BASE_IMAGE=$_REGISTRY/scion-base:latest'
      - '-t'
      - '$_REGISTRY/scion-adk-agent:$_SHORT_SHA'
      - '-t'
      - '$_REGISTRY/scion-adk-agent:latest'
      - '-f'
      - 'Dockerfile'
      - '--pull'
      - '--push'
      - '.'
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

substitutions:
  _REGISTRY: 'us-central1-docker.pkg.dev/${PROJECT_ID}/public-docker'
options:
  dynamicSubstitutions: true
  machineType: 'E2_HIGHCPU_8'
timeout: 1800s # 30 minutes
