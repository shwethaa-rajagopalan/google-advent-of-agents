# Cloud Build configuration for building just the core-base image
# This is the foundation layer with Go, Git, unix tools, and GCS fuse
# Use this when you only need to update the core foundation tools
#
# Note: Build and push are split into separate steps to avoid OAuth token
# expiration during long builds. The push step gets a fresh token.
steps:
  # Enable multi-arch builds
  - name: 'gcr.io/cloud-builders/docker'
    id: 'setup-buildx'
    args: ['buildx', 'create', '--name', 'mybuilder', '--use']
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'bootstrap-buildx'
    args: ['buildx', 'inspect', '--bootstrap']
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

  # Build core-base image and cache locally (no push yet)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-core-base'
    dir: 'image-build/core-base'
    args:
      - 'buildx'
      - 'build'
      - '--platform'
      - 'linux/amd64,linux/arm64'
      - '--cache-to'
      - 'type=local,dest=/workspace/buildx-cache,mode=max'
      - '-t'
      - '$_REGISTRY/core-base:$_SHORT_SHA'
      - '-t'
      - '$_REGISTRY/core-base:latest'
      - '-f'
      - 'Dockerfile'
      - '.'
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

  # Push core-base image (gets fresh OAuth token, uses cached layers)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-core-base'
    dir: 'image-build/core-base'
    args:
      - 'buildx'
      - 'build'
      - '--platform'
      - 'linux/amd64,linux/arm64'
      - '--cache-from'
      - 'type=local,src=/workspace/buildx-cache'
      - '-t'
      - '$_REGISTRY/core-base:$_SHORT_SHA'
      - '-t'
      - '$_REGISTRY/core-base:latest'
      - '-f'
      - 'Dockerfile'
      - '--push'
      - '.'
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

substitutions:
  _REGISTRY: 'us-central1-docker.pkg.dev/${PROJECT_ID}/public-docker'
options:
  dynamicSubstitutions: true
  machineType: 'E2_HIGHCPU_8'
timeout: 10800s # 3 hours for core-base build
