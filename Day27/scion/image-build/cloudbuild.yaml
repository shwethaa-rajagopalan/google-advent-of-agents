# Cloud Build configuration for building ALL images (full rebuild)
# This builds core-base -> scion-base -> all harnesses
# Use this for complete rebuilds or when you need everything updated
#
# Note: Long-building images (core-base) have build/push split into separate
# steps to avoid OAuth token expiration. The push step gets a fresh token.
steps:
  # Enable multi-arch builds
  - name: 'gcr.io/cloud-builders/docker'
    id: 'setup-buildx'
    args: ['buildx', 'create', '--name', 'mybuilder', '--use']
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'bootstrap-buildx'
    args: ['buildx', 'inspect', '--bootstrap']
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

  # 1a. Build Core Base Image and cache locally (no push yet)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-core-base'
    dir: 'image-build/core-base'
    args:
      - 'buildx'
      - 'build'
      - '--platform'
      - 'linux/amd64,linux/arm64'
      - '--cache-to'
      - 'type=local,dest=/workspace/buildx-cache-core,mode=max'
      - '-t'
      - '$_REGISTRY/core-base:$_SHORT_SHA'
      - '-t'
      - '$_REGISTRY/core-base:latest'
      - '-f'
      - 'Dockerfile'
      - '.'
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

  # 1b. Push Core Base Image (gets fresh OAuth token, uses cached layers)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-core-base'
    dir: 'image-build/core-base'
    args:
      - 'buildx'
      - 'build'
      - '--platform'
      - 'linux/amd64,linux/arm64'
      - '--cache-from'
      - 'type=local,src=/workspace/buildx-cache-core'
      - '-t'
      - '$_REGISTRY/core-base:$_SHORT_SHA'
      - '-t'
      - '$_REGISTRY/core-base:latest'
      - '-f'
      - 'Dockerfile'
      - '--push'
      - '.'
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

  # 2. Build Scion Base Image (uses repo root for sciontool build)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-scion-base'
    args:
      - 'buildx'
      - 'build'
      - '--platform'
      - 'linux/amd64,linux/arm64'
      - '--build-arg'
      - 'BASE_IMAGE=$_REGISTRY/core-base:$_SHORT_SHA'
      - '--build-arg'
      - 'GIT_COMMIT=$_COMMIT_SHA'
      - '-t'
      - '$_REGISTRY/scion-base:$_SHORT_SHA'
      - '-t'
      - '$_REGISTRY/scion-base:latest'
      - '-f'
      - 'image-build/scion-base/Dockerfile'
      - '--pull'
      - '--push'
      - '.'
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

  # 3. Build Gemini Harness Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-scion-gemini'
    dir: 'image-build/gemini'
    args:
      - 'buildx'
      - 'build'
      - '--platform'
      - 'linux/amd64,linux/arm64'
      - '--build-arg'
      - 'BASE_IMAGE=$_REGISTRY/scion-base:$_SHORT_SHA'
      - '-t'
      - '$_REGISTRY/scion-gemini:$_SHORT_SHA'
      - '-t'
      - '$_REGISTRY/scion-gemini:latest'
      - '-f'
      - 'Dockerfile'
      - '--pull'
      - '--push'
      - '.'
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

  # 4. Build Claude Harness Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-scion-claude'
    dir: 'image-build/claude'
    args:
      - 'buildx'
      - 'build'
      - '--platform'
      - 'linux/amd64,linux/arm64'
      - '--build-arg'
      - 'BASE_IMAGE=$_REGISTRY/scion-base:$_SHORT_SHA'
      - '-t'
      - '$_REGISTRY/scion-claude:$_SHORT_SHA'
      - '-t'
      - '$_REGISTRY/scion-claude:latest'
      - '-f'
      - 'Dockerfile'
      - '--pull'
      - '--push'
      - '.'
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

  # 5. Build OpenCode Harness Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-scion-opencode'
    dir: 'image-build/opencode'
    args:
      - 'buildx'
      - 'build'
      - '--platform'
      - 'linux/amd64,linux/arm64'
      - '--build-arg'
      - 'BASE_IMAGE=$_REGISTRY/scion-base:$_SHORT_SHA'
      - '-t'
      - '$_REGISTRY/scion-opencode:$_SHORT_SHA'
      - '-t'
      - '$_REGISTRY/scion-opencode:latest'
      - '-f'
      - 'Dockerfile'
      - '--pull'
      - '--push'
      - '.'
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

  # 6. Build Codex Harness Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-scion-codex'
    dir: 'image-build/codex'
    args:
      - 'buildx'
      - 'build'
      - '--platform'
      - 'linux/amd64,linux/arm64'
      - '--build-arg'
      - 'BASE_IMAGE=$_REGISTRY/scion-base:$_SHORT_SHA'
      - '-t'
      - '$_REGISTRY/scion-codex:$_SHORT_SHA'
      - '-t'
      - '$_REGISTRY/scion-codex:latest'
      - '-f'
      - 'Dockerfile'
      - '--pull'
      - '--push'
      - '.'
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

substitutions:
  _REGISTRY: 'us-central1-docker.pkg.dev/${PROJECT_ID}/public-docker'
options:
  dynamicSubstitutions: true
  machineType: 'E2_HIGHCPU_8'
timeout: 14400s # 4 hours for full rebuild
