<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scion Docs Agent</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f8f9fa;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .header {
    padding: 12px 16px;
    background: #1a1a2e;
    color: #e0e0e0;
    font-size: 14px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .message {
    max-width: 90%;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.5;
    word-wrap: break-word;
  }
  .message.user {
    align-self: flex-end;
    background: #1a1a2e;
    color: #fff;
  }
  .message.agent {
    align-self: flex-start;
    background: #fff;
    border: 1px solid #dee2e6;
    color: #212529;
  }
  .message.agent pre {
    background: #f1f3f5;
    padding: 8px;
    border-radius: 4px;
    overflow-x: auto;
    margin: 8px 0;
  }
  .message.agent code {
    background: #f1f3f5;
    padding: 1px 4px;
    border-radius: 3px;
    font-size: 13px;
  }
  .message.agent pre code {
    background: none;
    padding: 0;
  }
  .message.error {
    align-self: center;
    background: #fff5f5;
    border: 1px solid #ffc9c9;
    color: #c92a2a;
    font-size: 13px;
  }
  .loading {
    align-self: flex-start;
    padding: 10px 14px;
    font-size: 13px;
    color: #868e96;
  }
  .loading .dots span {
    animation: blink 1.4s infinite both;
  }
  .loading .dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }
  .input-area {
    padding: 12px 16px;
    background: #fff;
    border-top: 1px solid #dee2e6;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  .input-area input {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid #ced4da;
    border-radius: 6px;
    font-size: 14px;
    outline: none;
  }
  .input-area input:focus { border-color: #1a1a2e; }
  .input-area button {
    padding: 8px 16px;
    background: #1a1a2e;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
  }
  .input-area button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
</style>
</head>
<body>
<div class="header">Scion Docs Agent</div>
<div class="messages" id="messages"></div>
<div class="input-area">
  <input type="text" id="query" placeholder="Ask about Scion..." autocomplete="off">
  <button id="send">Ask</button>
</div>
<script>
  const messagesEl = document.getElementById('messages');
  const queryEl = document.getElementById('query');
  const sendBtn = document.getElementById('send');

  function addMessage(text, cls) {
    const div = document.createElement('div');
    div.className = 'message ' + cls;
    if (cls === 'agent') {
      div.innerHTML = marked.parse(text);
    } else {
      div.textContent = text;
    }
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function showLoading() {
    const div = document.createElement('div');
    div.className = 'loading';
    div.id = 'loading';
    div.innerHTML = 'Thinking<span class="dots"><span>.</span><span>.</span><span>.</span></span>';
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideLoading() {
    const el = document.getElementById('loading');
    if (el) el.remove();
  }

  async function ask() {
    const query = queryEl.value.trim();
    if (!query) return;

    addMessage(query, 'user');
    queryEl.value = '';
    sendBtn.disabled = true;
    showLoading();

    try {
      const res = await fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query }),
      });
      hideLoading();
      const data = await res.json();
      if (res.ok) {
        addMessage(data.answer, 'agent');
      } else {
        addMessage(data.error || 'Something went wrong', 'error');
      }
    } catch (err) {
      hideLoading();
      addMessage('Network error: could not reach the server', 'error');
    } finally {
      sendBtn.disabled = false;
      queryEl.focus();
    }
  }

  sendBtn.addEventListener('click', ask);
  queryEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') ask();
  });
</script>
</body>
</html>
