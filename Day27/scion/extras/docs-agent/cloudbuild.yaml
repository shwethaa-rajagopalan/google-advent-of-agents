# Cloud Build configuration for Scion Docs Agent
steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-docs-agent-image'
    args:
      - 'build'
      - '-t'
      - '$_REGISTRY/docs-agent:$_GIT_SHA'
      - '-t'
      - '$_REGISTRY/docs-agent:latest'
      - '-f'
      - 'Dockerfile'
      - '.'

  # 2. Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-docs-agent-image-sha'
    args:
      - 'push'
      - '$_REGISTRY/docs-agent:$_GIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-docs-agent-image-latest'
    args:
      - 'push'
      - '$_REGISTRY/docs-agent:latest'

  # 3. Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-to-cloud-run'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image'
      - '$_REGISTRY/docs-agent:$_GIT_SHA'
      - '--region'
      - '$_REGION'
      - '--platform'
      - 'managed'
      - '--concurrency'
      - '5'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '2'
      - '--timeout'
      - '120s'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '5'
      - '--set-secrets'
      - 'GEMINI_API_KEY=GEMINI_API_KEY:latest'

substitutions:
  _REGISTRY: 'us-central1-docker.pkg.dev/duet01/scion-images'
  _SERVICE_NAME: 'scion-docs-agent'
  _REGION: 'us-west1'
  _GIT_SHA: 'latest'

options:
  dynamicSubstitutions: true
  machineType: 'E2_HIGHCPU_8'
