
check_for_update_on_startup = false
approval_policy = "never"

# Note this notify script is commented out as experimental
# TODO remove and replace when codex lands full hook support
# notify = "sh ~/.codex/scion_notify.sh"

model = "gpt-5.4"
model_reasoning_effort = "medium"

[notice.model_migrations]
"gpt-5.1-codex-mini" = "gpt-5.2-codex"
"gpt-5.2-codex" = "gpt-5.3-codex"
"gpt-5.3-codex" = "gpt-5.4"

[projects."/workspace"]
trust_level = "trusted"

[otel]
# Scion reconciles these values at agent start time when telemetry is enabled.
enabled = false
log_user_prompt = false   # redact user prompts unless explicitly enabled
exporter = { otlp-grpc = {
  endpoint = "localhost:4317",
  headers = { "x-otlp-meta" = "abc123" }
}}

